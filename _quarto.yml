project:
  type: website
  output-dir: docs

website:
  title: "Naud Sluis"
  site-url: "https://NaudSluis.github.io/comp_music.io"
  
  # The Top Navigation Bar
  navbar:
    background: dark
    left:
      - href: index.qmd
        text: Home
      - href: portfolio/index.qmd
        text: Portfolio
      - href: homework/index.qmd
        text: Homework

  # The Contextual Sidebars
  sidebar:
    # Sidebar for the Portfolio section
    - id: portfolio
      style: "docked"
      contents:
        - auto: "portfolio/" # Automatically grabs all files in this folder
    
    # Sidebar for the Homework section
    - id: homework
      style: "docked"
      contents:
        - auto: "homework/" # Automatically grabs all files in this folder

format:
  html:
    lightbox: true
    theme: 
      - darkly      # A built-in dark theme for a good foundation
      - custom.scss # Your custom 90s hip-hop styling
    toc: true